<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <style>
      .gauge-bg { fill: none; stroke-width: 12; stroke-linecap: round; }
      .gauge-low { stroke: #86efac; }
      .gauge-mid { stroke: #fbbf24; }
      .gauge-high { stroke: #ea580c; }
    </style>
  </defs>

  <!-- Gauge arc background -->
  <circle cx="50" cy="50" r="35" fill="#fafaf9" stroke="#e7e5e4" stroke-width="2"/>

  <!-- Gauge segments (low, mid, high) -->
  <path class="gauge-bg gauge-low" d="M 20,65 A 35,35 0 0,1 35,25" />
  <path class="gauge-bg gauge-mid" d="M 35,25 A 35,35 0 0,1 65,25" />
  <path class="gauge-bg gauge-high" d="M 65,25 A 35,35 0 0,1 80,65" />

  <!-- Center dot -->
  <circle cx="50" cy="50" r="6" fill="#292524"/>

  <!-- Needle pointing to high zone -->
  <line x1="50" y1="50" x2="72" y2="38" stroke="#292524" stroke-width="3" stroke-linecap="round"/>
  <circle cx="50" cy="50" r="4" fill="#ea580c"/>
</svg>
